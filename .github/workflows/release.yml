name: release

on:
  push:
    tags: ["v*.*.*"]

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[dev]" build
      - run: python - <<'PY'
          import pathlib
          import tomllib
          import os
          version = tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"]
          tag = os.environ["GITHUB_REF_NAME"].removeprefix("v")
          raise SystemExit(0 if version == tag else 1)
        shell: bash
      - run: ruff format --check
      - run: ruff check
      - run: mypy --strict src tests
      - run: pytest
      - run: cyclonedx-py environment -o sbom.cdx.json
      - run: python -m build
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
            sbom.cdx.json
