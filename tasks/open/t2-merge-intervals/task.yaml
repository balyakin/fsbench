id: t2-merge-intervals
version: "0.1.0"
tier: 2
category: api_preserving_rewrite
description: "Merge overlapping integer intervals while preserving sorted non-overlapping output."
timeout_s: 120
editable_files:
  - app.py
required_checks:
  - pytest_behavior
  - ast_defines_solve
  - diff_scope_limit
  - no_test_tamper
checks:
  - name: pytest_behavior
    type: pytest
    check_timeout_s: 30
    inject:
      - _fsbench_hidden_test_behavior.py
    args:
      - tests
      - _fsbench_hidden_test_behavior.py
  - name: ast_defines_solve
    type: ast_defines
    symbol: solve
    kind: function
    in_file: app.py
  - name: diff_scope_limit
    type: diff_scope
    max_files_changed: 1
    forbid_changes:
      - tests/**
      - task.md
  - name: no_test_tamper
    type: no_test_tamper
